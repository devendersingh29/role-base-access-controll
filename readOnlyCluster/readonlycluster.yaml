apiVersion: v1
kind: ServiceAccount
metadata:
  name: max
  namespace: rbac

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: read-only-cluster
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: max-read-binding

subjects:
- kind: ServiceAccount
  name: max
  namespace: rbac

roleRef:
  kind: ClusterRole
  name: read-only-cluster
  apiGroup: rbac.authorization.k8s.io