apiVersion: v1
kind: ServiceAccount
metadata:
  name: sunjay
  namespace: jenkins

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: jenkins
  name: jenkins-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]


---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sunjay-binding
  namespace: jenkins
subjects:
- kind: ServiceAccount
  name: sunjay
  namespace: jenkins
roleRef:
  kind: Role
  name: jenkins-role
  apiGroup: rbac.authorization.k8s.io


# kubectl --kubeconfig=sunjay-config.yaml get pods -n jenkins (to check that user has the access)
